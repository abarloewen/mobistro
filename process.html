<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Process — Mobistro</title>
  <meta name="description" content="From concept to street in weeks. Six managed stages, one point of contact — Mobistro handles design, engineering and turnkey delivery.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="process">

  <!-- PAGE HEAD -->
  <section class="page-head" data-bg="kitchen_interior">
    <div class="container">
      <div class="breadcrumb"><a href="index.html" data-i18n="breadcrumb.home"></a><span>/</span><span data-i18n="nav.process"></span></div>
      <span class="eyebrow" data-i18n="proc.eyebrow"></span>
      <h1 data-i18n="proc.head.title"></h1>
      <p class="lead" data-i18n="proc.head.lead"></p>
    </div>
  </section>

  <!-- STEPS -->
  <section class="section">
    <div class="container">
      <div class="steps">
        <article class="step reveal"><div class="step-no">1</div><div><h3 data-i18n="step1.title"></h3><p data-i18n="step1.desc"></p></div></article>
        <article class="step reveal"><div class="step-no">2</div><div><h3 data-i18n="step2.title"></h3><p data-i18n="step2.desc"></p></div></article>
        <article class="step reveal"><div class="step-no">3</div><div><h3 data-i18n="step3.title"></h3><p data-i18n="step3.desc"></p></div></article>
        <article class="step reveal"><div class="step-no">4</div><div><h3 data-i18n="step4.title"></h3><p data-i18n="step4.desc"></p></div></article>
        <article class="step reveal"><div class="step-no">5</div><div><h3 data-i18n="step5.title"></h3><p data-i18n="step5.desc"></p></div></article>
        <article class="step reveal"><div class="step-no">6</div><div><h3 data-i18n="step6.title"></h3><p data-i18n="step6.desc"></p></div></article>
      </div>
    </div>
  </section>

  <!-- WHY / TURNKEY SPLIT -->
  <section class="section dark">
    <div class="container">
      <div class="split">
        <div class="split-media reveal" data-img="kitchen_interior" data-illo="hero" data-imgw="1000"><span class="ph-tag">Inside the build</span></div>
        <div class="split-copy reveal">
          <span class="eyebrow on-dark" data-i18n="vp.eyebrow"></span>
          <h2 class="mt-s" data-i18n="vp.title"></h2>
          <p class="lead mt-s" data-i18n="vp.lead"></p>
          <ul class="check-list">
            <li><span class="ck" data-ic="check"></span><span data-i18n="pillar1.title"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="pillar2.title"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="pillar3.title"></span></li>
          </ul>
          <div class="mt-m"><a class="btn btn--light" href="solutions.html" data-i18n="prod.more"></a></div>
        </div>
      </div>
    </div>
  </section>

  <!-- CTA BAND -->
  <section class="section">
    <div class="container">
      <div class="cta-band reveal">
        <h2 data-i18n="ctaband.title"></h2>
        <p data-i18n="ctaband.text"></p>
        <div class="hero-cta"><a class="btn btn--primary" href="contact.html" data-i18n="ctaband.btn"></a></div>
      </div>
    </div>
  </section>

  <script src="i18n.js"></script>
  <script src="main.js"></script>
</body>
</html>

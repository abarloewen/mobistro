<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Partnership — Mobistro</title>
  <meta name="description" content="European design meets proven manufacturing. Mobistro pairs premium brand thinking with Ireman's 40+ years of mobile-unit engineering — delivered white-label.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="partnership">

  <!-- PAGE HEAD -->
  <section class="page-head" data-bg="team_workshop">
    <div class="container">
      <div class="breadcrumb"><a href="index.html" data-i18n="breadcrumb.home"></a><span>/</span><span data-i18n="nav.partnership"></span></div>
      <span class="eyebrow" data-i18n="about.eyebrow"></span>
      <h1 data-i18n="about.hero.title"></h1>
      <p class="lead" data-i18n="about.hero.lead"></p>
    </div>
  </section>

  <!-- STORY -->
  <section class="section">
    <div class="container">
      <div class="section-head center reveal">
        <span class="eyebrow" data-i18n="about.story.eyebrow"></span>
        <h2 data-i18n="about.story.title"></h2>
        <p class="lead" data-i18n="about.story.body"></p>
      </div>
    </div>
  </section>

  <!-- IREMAN + MOBISTRO -->
  <section class="section dark section--tight">
    <div class="container">
      <div class="grid-2">
        <article class="card reveal" style="background:var(--ink-2);border-color:var(--line-dark)">
          <span class="num-tag" data-i18n="prod.t.kitchen" style="display:none"></span>
          <h3 style="color:#fff" data-i18n="about.ireman.title"></h3>
          <p data-i18n="about.ireman.body"></p>
          <ul class="check-list">
            <li><span class="ck" data-ic="check"></span><span data-i18n="about.ireman.f1"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="about.ireman.f2"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="about.ireman.f3"></span></li>
          </ul>
        </article>
        <article class="card reveal" style="background:var(--ink-2);border-color:var(--line-dark)">
          <h3 style="color:#fff" data-i18n="about.mobistro.title"></h3>
          <p data-i18n="about.mobistro.body"></p>
          <ul class="check-list">
            <li><span class="ck" data-ic="check"></span><span data-i18n="about.mobistro.f1"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="about.mobistro.f2"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="about.mobistro.f3"></span></li>
          </ul>
        </article>
      </div>
    </div>
  </section>

  <!-- WHITE LABEL -->
  <section class="section">
    <div class="container">
      <div class="split">
        <div class="split-media reveal" data-img="vehicle_wrap" data-illo="truck" data-imgw="1000"><span class="ph-tag">Your brand · Your name</span></div>
        <div class="split-copy reveal">
          <span class="eyebrow" data-i18n="about.mobistro.f3"></span>
          <h2 class="mt-s" data-i18n="whitelabel.title"></h2>
          <p class="lead mt-s" data-i18n="whitelabel.body"></p>
          <div class="mt-m"><a class="btn btn--primary" href="contact.html" data-i18n="cta.quote"></a></div>
        </div>
      </div>
    </div>
  </section>

  <!-- VALUES -->
  <section class="section dark">
    <div class="container">
      <div class="section-head center reveal">
        <span class="eyebrow on-dark" data-i18n="about.eyebrow"></span>
        <h2 data-i18n="about.values.title"></h2>
      </div>
      <div class="grid-3">
        <article class="card reveal" style="background:var(--ink-2);border-color:var(--line-dark)">
          <div class="ic" data-ic="bolt"></div>
          <h3 style="color:#fff" data-i18n="val1.title"></h3>
          <p data-i18n="val1.desc"></p>
        </article>
        <article class="card reveal" style="background:var(--ink-2);border-color:var(--line-dark)">
          <div class="ic" data-ic="check"></div>
          <h3 style="color:#fff" data-i18n="val2.title"></h3>
          <p data-i18n="val2.desc"></p>
        </article>
        <article class="card reveal" style="background:var(--ink-2);border-color:var(--line-dark)">
          <div class="ic" data-ic="layers"></div>
          <h3 style="color:#fff" data-i18n="val3.title"></h3>
          <p data-i18n="val3.desc"></p>
        </article>
      </div>
    </div>
  </section>

  <!-- CTA BAND -->
  <section class="section">
    <div class="container">
      <div class="cta-band reveal">
        <h2 data-i18n="ctaband.title"></h2>
        <p data-i18n="ctaband.text"></p>
        <div class="hero-cta"><a class="btn btn--primary" href="contact.html" data-i18n="ctaband.btn"></a></div>
      </div>
    </div>
  </section>

  <script src="i18n.js"></script>
  <script src="main.js"></script>
</body>
</html>

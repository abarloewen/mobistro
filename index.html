<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobistro — Premium Mobile Gastronomy & Food Trucks</title>
  <meta name="description" content="Mobistro builds premium food trucks, trailers and kiosks for German-speaking markets. Turnkey delivery, brand scalability and full branding.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="home">

  <!-- HERO -->
  <section class="hero hero--photo">
    <div class="hero-bg" data-img-bg="hero"></div>
    <div class="container">
      <div class="hero-copy">
        <span class="eyebrow on-dark" data-i18n="hero.eyebrow"></span>
        <h1 data-i18n-html="hero.title"></h1>
        <p class="lead" data-i18n="hero.lead"></p>
        <div class="hero-cta">
          <a class="btn btn--primary" href="konfigurator.html" data-i18n="build.eyebrow"></a>
          <a class="btn btn--ghost" href="contact.html" data-i18n="hero.cta1"></a>
        </div>
        <div class="hero-trust">
          <span data-i18n="hero.trust1"></span><span class="dot"></span>
          <span data-i18n="hero.trust2"></span><span class="dot"></span>
          <span data-i18n="hero.trust3"></span>
        </div>
      </div>
    </div>
    <div class="scroll-cue" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M6 13l6 6 6-6"/></svg></div>
  </section>

  <!-- TRUST MARQUEE -->
  <div class="marquee" aria-hidden="true">
    <div class="marquee-track">
      <span data-i18n="home.marquee"></span><span class="marquee-dot">✦</span>
      <span data-i18n="home.marquee"></span><span class="marquee-dot">✦</span>
    </div>
  </div>

  <!-- STATS -->
  <section class="section--tight">
    <div class="container">
      <div class="stats reveal">
        <div class="stat"><div class="num" data-i18n-html="stat1.num"></div><div class="lbl" data-i18n="stat1.lbl"></div></div>
        <div class="stat"><div class="num" data-i18n-html="stat2.num"></div><div class="lbl" data-i18n="stat2.lbl"></div></div>
        <div class="stat"><div class="num" data-i18n-html="stat3.num"></div><div class="lbl" data-i18n="stat3.lbl"></div></div>
        <div class="stat"><div class="num" data-i18n-html="stat4.num"></div><div class="lbl" data-i18n="stat4.lbl"></div></div>
      </div>
    </div>
  </section>

  <!-- VALUE PROP / PILLARS -->
  <section class="section">
    <div class="container">
      <div class="section-head center reveal">
        <span class="eyebrow" data-i18n="vp.eyebrow"></span>
        <h2 data-i18n="vp.title"></h2>
        <p class="lead" data-i18n="vp.lead"></p>
      </div>
      <div class="grid-3">
        <article class="card reveal">
          <div class="ic" data-ic="bolt"></div>
          <span class="num-tag" data-i18n="pillar1.tag"></span>
          <h3 data-i18n="pillar1.title"></h3>
          <p data-i18n="pillar1.desc"></p>
        </article>
        <article class="card reveal">
          <div class="ic" data-ic="layers"></div>
          <span class="num-tag" data-i18n="pillar2.tag"></span>
          <h3 data-i18n="pillar2.title"></h3>
          <p data-i18n="pillar2.desc"></p>
        </article>
        <article class="card reveal">
          <div class="ic" data-ic="brush"></div>
          <span class="num-tag" data-i18n="pillar3.tag"></span>
          <h3 data-i18n="pillar3.title"></h3>
          <p data-i18n="pillar3.desc"></p>
        </article>
      </div>
    </div>
  </section>

  <!-- PRODUCTS PREVIEW -->
  <section class="section dark">
    <div class="container">
      <div class="section-head center reveal">
        <span class="eyebrow on-dark" data-i18n="prod.eyebrow"></span>
        <h2 data-i18n="prod.title"></h2>
        <p class="lead" data-i18n="prod.lead"></p>
      </div>
      <div class="prod-grid">
        <article class="prod reveal">
          <div class="prod-media" data-img="food_truck" data-illo="truck" data-imgw="800"><span class="ph-tag">Food Truck</span></div>
          <div class="prod-body">
            <h3 data-i18n="prod.truck.name"></h3>
            <p data-i18n="prod.truck.desc"></p>
            <div class="tags"><span data-i18n="prod.t.kitchen"></span><span data-i18n="prod.t.wrap"></span><span data-i18n="prod.t.power"></span></div>
            <a class="link-arrow" href="solutions.html"><span data-i18n="prod.detail"></span><span data-ic="arrow"></span></a>
          </div>
        </article>
        <article class="prod reveal">
          <div class="prod-media" data-img="food_trailer" data-illo="trailer" data-imgw="800"><span class="ph-tag">Food Trailer</span></div>
          <div class="prod-body">
            <h3 data-i18n="prod.trailer.name"></h3>
            <p data-i18n="prod.trailer.desc"></p>
            <div class="tags"><span data-i18n="prod.t.kitchen"></span><span data-i18n="prod.t.wrap"></span><span data-i18n="prod.t.certified"></span></div>
            <a class="link-arrow" href="solutions.html"><span data-i18n="prod.detail"></span><span data-ic="arrow"></span></a>
          </div>
        </article>
        <article class="prod reveal">
          <div class="prod-media" data-img="food_kiosk" data-illo="kiosk" data-imgw="800"><span class="ph-tag">Food Kiosk</span></div>
          <div class="prod-body">
            <h3 data-i18n="prod.kiosk.name"></h3>
            <p data-i18n="prod.kiosk.desc"></p>
            <div class="tags"><span data-i18n="prod.t.wrap"></span><span data-i18n="prod.t.power"></span><span data-i18n="prod.t.certified"></span></div>
            <a class="link-arrow" href="solutions.html"><span data-i18n="prod.detail"></span><span data-ic="arrow"></span></a>
          </div>
        </article>
        <article class="prod reveal">
          <div class="prod-media" data-img="coffee_cart" data-illo="cart" data-imgw="800"><span class="ph-tag">Cart & Coffee</span></div>
          <div class="prod-body">
            <h3 data-i18n="prod.cart.name"></h3>
            <p data-i18n="prod.cart.desc"></p>
            <div class="tags"><span data-i18n="prod.t.kitchen"></span><span data-i18n="prod.t.wrap"></span></div>
            <a class="link-arrow" href="solutions.html"><span data-i18n="prod.detail"></span><span data-ic="arrow"></span></a>
          </div>
        </article>
      </div>
      <div class="center mt-m reveal">
        <a class="btn btn--light" href="solutions.html" data-i18n="prod.more"></a>
      </div>
    </div>
  </section>

  <!-- IN ACTION GALLERY -->
  <section class="section">
    <div class="container">
      <div class="section-head center reveal">
        <span class="eyebrow" data-i18n="gallery.eyebrow"></span>
        <h2 data-i18n="gallery.title"></h2>
      </div>
      <div class="home-gallery reveal" id="homeGallery"></div>
    </div>
  </section>

  <!-- PROCESS TEASER -->
  <section class="section">
    <div class="container">
      <div class="split">
        <div class="split-media reveal" data-img="kitchen_interior" data-illo="trailer" data-imgw="1000"><span class="ph-tag">Inside the build</span></div>
        <div class="split-copy reveal">
          <span class="eyebrow" data-i18n="proc.eyebrow"></span>
          <h2 class="mt-s" data-i18n="proc.title"></h2>
          <p class="lead mt-s" data-i18n="proc.lead"></p>
          <ul class="check-list">
            <li><span class="ck" data-ic="check"></span><span data-i18n="step1.title"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="step2.title"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="step3.title"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="step5.title"></span></li>
          </ul>
          <div class="mt-m"><a class="btn btn--ghost" href="process.html" data-i18n="proc.eyebrow"></a></div>
        </div>
      </div>
    </div>
  </section>

  <!-- PARTNERSHIP TEASER -->
  <section class="section dark">
    <div class="container">
      <div class="split split--rev">
        <div class="split-media reveal" data-img="team_workshop" data-illo="truck" data-imgw="1000"><span class="ph-tag">Ireman × Mobistro</span></div>
        <div class="split-copy reveal">
          <span class="eyebrow on-dark" data-i18n="about.eyebrow"></span>
          <h2 class="mt-s" data-i18n="about.story.title"></h2>
          <p class="lead mt-s" data-i18n="about.story.body"></p>
          <div class="mt-m"><a class="btn btn--light" href="partnership.html" data-i18n="about.eyebrow"></a></div>
        </div>
      </div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section class="section dark">
    <div class="container">
      <div class="section-head center reveal">
        <span class="eyebrow on-dark" data-i18n="tst.eyebrow"></span>
        <h2 data-i18n="tst.title"></h2>
      </div>
      <div class="tst-slider reveal" id="tstSlider">
        <div class="tst-slide active">
          <div class="tst-quoteic" data-ic="quote"></div>
          <p class="tst-quote" data-i18n="tst.q1"></p>
          <div class="tst-meta"><div class="tst-name" data-i18n="tst.n1"></div><div class="tst-role" data-i18n="tst.r1"></div></div>
        </div>
        <div class="tst-slide">
          <div class="tst-quoteic" data-ic="quote"></div>
          <p class="tst-quote" data-i18n="tst.q2"></p>
          <div class="tst-meta"><div class="tst-name" data-i18n="tst.n2"></div><div class="tst-role" data-i18n="tst.r2"></div></div>
        </div>
        <div class="tst-slide">
          <div class="tst-quoteic" data-ic="quote"></div>
          <p class="tst-quote" data-i18n="tst.q3"></p>
          <div class="tst-meta"><div class="tst-name" data-i18n="tst.n3"></div><div class="tst-role" data-i18n="tst.r3"></div></div>
        </div>
        <div class="tst-nav">
          <button class="tst-arrow is-prev" id="tstPrev" aria-label="Previous" data-ic="arrow"></button>
          <div class="tst-dots" id="tstDots"></div>
          <button class="tst-arrow" id="tstNext" aria-label="Next" data-ic="arrow"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- CTA BAND -->
  <section class="section">
    <div class="container">
      <div class="cta-band reveal">
        <h2 data-i18n="ctaband.title"></h2>
        <p data-i18n="ctaband.text"></p>
        <div class="hero-cta">
          <a class="btn btn--primary" href="contact.html" data-i18n="ctaband.btn"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <div class="lb-ov" data-lbclose></div>
    <button class="lb-close" data-lbclose aria-label="Schließen"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <img id="lbImg" src="" alt="">
  </div>

  <script src="i18n.js"></script>
  <script src="main.js"></script>
</body>
</html>

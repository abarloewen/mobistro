<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solutions — Mobistro</title>
  <meta name="description" content="Food trucks, trailers, kiosks and carts — fully customised, brand-wrapped and turnkey. Mobistro builds the mobile format that fits your concept.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="solutions">

  <!-- PAGE HEAD -->
  <section class="page-head" data-bg="food_truck">
    <div class="container">
      <div class="breadcrumb"><a href="index.html" data-i18n="breadcrumb.home"></a><span>/</span><span data-i18n="nav.solutions"></span></div>
      <span class="eyebrow" data-i18n="prod.eyebrow"></span>
      <h1 data-i18n="sol.title"></h1>
      <p class="lead" data-i18n="sol.lead"></p>
    </div>
  </section>

  <!-- FOOD TRUCKS -->
  <section class="section">
    <div class="container">
      <div class="split">
        <div class="split-media reveal" data-img="food_truck" data-illo="truck"><span class="ph-tag">Food Truck</span></div>
        <div class="split-copy reveal">
          <span class="tag-pill" data-i18n="prod.truck.name"></span>
          <h2 class="mt-s" data-i18n="prod.truck.name"></h2>
          <p class="lead mt-s" data-i18n="prod.truck.long"></p>
          <div class="tags" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:20px">
            <span class="tag-pill" data-i18n="prod.t.kitchen"></span>
            <span class="tag-pill" data-i18n="prod.t.wrap"></span>
            <span class="tag-pill" data-i18n="prod.t.power"></span>
            <span class="tag-pill" data-i18n="prod.t.certified"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOD TRAILERS -->
  <section class="section dark">
    <div class="container">
      <div class="split split--rev">
        <div class="split-media reveal" data-img="food_trailer" data-illo="trailer"><span class="ph-tag">Food Trailer</span></div>
        <div class="split-copy reveal">
          <span class="tag-pill" data-i18n="prod.trailer.name"></span>
          <h2 class="mt-s" data-i18n="prod.trailer.name"></h2>
          <p class="lead mt-s" data-i18n="prod.trailer.long"></p>
          <div class="tags" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:20px">
            <span class="tag-pill" data-i18n="prod.t.kitchen"></span>
            <span class="tag-pill" data-i18n="prod.t.wrap"></span>
            <span class="tag-pill" data-i18n="prod.t.power"></span>
            <span class="tag-pill" data-i18n="prod.t.certified"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOD KIOSKS -->
  <section class="section">
    <div class="container">
      <div class="split">
        <div class="split-media reveal" data-img="food_kiosk" data-illo="kiosk"><span class="ph-tag">Food Kiosk</span></div>
        <div class="split-copy reveal">
          <span class="tag-pill" data-i18n="prod.kiosk.name"></span>
          <h2 class="mt-s" data-i18n="prod.kiosk.name"></h2>
          <p class="lead mt-s" data-i18n="prod.kiosk.long"></p>
          <div class="tags" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:20px">
            <span class="tag-pill" data-i18n="prod.t.kitchen"></span>
            <span class="tag-pill" data-i18n="prod.t.wrap"></span>
            <span class="tag-pill" data-i18n="prod.t.certified"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CARTS & WAGONS -->
  <section class="section dark">
    <div class="container">
      <div class="split split--rev">
        <div class="split-media reveal" data-img="coffee_cart" data-illo="cart"><span class="ph-tag">Cart & Coffee</span></div>
        <div class="split-copy reveal">
          <span class="tag-pill" data-i18n="prod.cart.name"></span>
          <h2 class="mt-s" data-i18n="prod.cart.name"></h2>
          <p class="lead mt-s" data-i18n="prod.cart.long"></p>
          <div class="tags" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:20px">
            <span class="tag-pill" data-i18n="prod.t.kitchen"></span>
            <span class="tag-pill" data-i18n="prod.t.wrap"></span>
            <span class="tag-pill" data-i18n="prod.t.power"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CUSTOMISATION -->
  <section class="section">
    <div class="container">
      <div class="split">
        <div class="split-copy reveal">
          <span class="eyebrow" data-i18n="sol.custom.eyebrow"></span>
          <h2 class="mt-s" data-i18n="sol.custom.title"></h2>
          <p class="lead mt-s" data-i18n="sol.custom.body"></p>
          <ul class="check-list">
            <li><span class="ck" data-ic="check"></span><span data-i18n="custom.f1"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="custom.f2"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="custom.f3"></span></li>
            <li><span class="ck" data-ic="check"></span><span data-i18n="custom.f4"></span></li>
          </ul>
        </div>
        <div class="split-media reveal" data-img="vehicle_wrap" data-illo="hero"><span class="ph-tag">Wrap & Branding</span></div>
      </div>
    </div>
  </section>

  <!-- CTA BAND -->
  <section class="section">
    <div class="container">
      <div class="cta-band reveal">
        <h2 data-i18n="ctaband.title"></h2>
        <p data-i18n="ctaband.text"></p>
        <div class="hero-cta"><a class="btn btn--primary" href="contact.html" data-i18n="ctaband.btn"></a></div>
      </div>
    </div>
  </section>

  <script src="i18n.js"></script>
  <script src="main.js"></script>
</body>
</html>
